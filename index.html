<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>365Energy - Business Intelligence Hub</title>

    <!-- Nhúng Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Nhúng React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Nhúng Babel để biên dịch JSX trực tiếp trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Nhúng Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Nhúng Firebase v8 Compat -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-slate-100 font-sans text-slate-900 selection:bg-emerald-200">
    <!-- ERROR CATCHER -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var string = msg.toLowerCase();
            var subtree = '';
            if (string.indexOf("script error") > -1){
                subtree = 'Script Error: See Browser Console for Detail';
            } else {
                var message = [
                    'Message: ' + msg,
                    'URL: ' + url,
                    'Line: ' + lineNo,
                    'Column: ' + columnNo,
                    'Error object: ' + JSON.stringify(error)
                ].join(' - ');
                subtree = message;
            }
            var el = document.createElement('div');
            el.style = "position:absolute;z-index:9999;background:red;color:white;padding:20px;top:0;left:0;";
            el.innerText = subtree;
            document.body.appendChild(el);
            return false;
        };
    </script>

    <div id="root"></div>

    <script type="text/babel" src="app.js"></script>

</body>

</html>
